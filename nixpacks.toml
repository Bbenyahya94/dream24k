[build]
nginx = true

[build.nginx]
root = "/app"
port = 80
index = "index.html"

[build.nginx.static]
"/" = {
    try_files = "$uri $uri/ /index.html"
}

[build.nginx.error_pages]
"404" = "/404.html"

# Cache static assets for better performance
[build.nginx.locations]
"~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$" = {
    expires = "1y",
    add_header = "Cache-Control public, immutable"
}

"~* \.(xml|txt)$" = {
    expires = "1d"
}
