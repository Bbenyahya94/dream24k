<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Dream24K IPTV</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            background: #0a0e1a;
            color: #e8edf5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
        }
        .error-number {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(145deg, #f7c948, #d4a020);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 16px;
        }
        .error-title span {
            color: #f7c948;
        }
        .error-desc {
            font-size: 18px;
            color: #8aa0c8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-home {
            background: linear-gradient(145deg, #f7c948, #d4a020);
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: #0a0e1a;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 32px rgba(212, 160, 32, 0.4);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.04);
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #6a8aaa;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .links a:hover {
            color: #f7c948;
        }
        @media (max-width: 480px) {
            .error-number { font-size: 80px; }
            .error-title { font-size: 24px; }
            .error-desc { font-size: 15px; }
            .btn-group { flex-direction: column; align-items: center; }
            .btn-home, .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-number">404</div>
        <h1 class="error-title">Page <span>Not Found</span></h1>
        <p class="error-desc">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        <div class="btn-group">
            <a href="/" class="btn-home"><i class="fas fa-home"></i> Go Home</a>
            <a href="#" class="btn-back" onclick="history.back(); return false;"><i class="fas fa-arrow-left"></i> Go Back</a>
        </div>
        <div class="links">
            <a href="/#packages">Subscriptions</a>
            <a href="/#reseller">Reseller</a>
            <a href="/#features">Features</a>
            <a href="/#faq">FAQ</a>
            <a href="/#support">Support</a>
            <a href="/#trial">Free Trial</a>
        </div>
    </div>
    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    </script>
</body>
</html>
