<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            text-align: center;
            padding: 100px 20px;
        }
        .error-page h1 {
            font-size: 100px;
            color: #0088cc;
        }
        .error-page h2 {
            font-size: 32px;
            margin: 20px 0;
        }
        .error-page p {
            color: #888;
            font-size: 18px;
        }
        .error-page a {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .error-page a:hover {
            background: #006699;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
