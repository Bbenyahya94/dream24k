<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Signal Lost · DREAM 24K IPTV</title>
    <meta name="description" content="Page not found · The channel you're looking for is offline. Return to DREAM 24K IPTV homepage." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ===== RESET & BASE (matches main site) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0b0d15;
            color: #eef2f6;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            text-decoration: none;
            color: #f7b731;
            transition: 0.3s;
        }

        /* ===== HEADER (exact match) ===== */
        header {
            background: rgba(11, 13, 21, 0.95);
            padding: 12px 0;
            border-bottom: 2px solid rgba(247, 183, 49, 0.3);
            backdrop-filter: blur(20px);
            width: 100%;
            z-index: 1000;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h1 {
            font-size: 1.6rem;
            color: #f7b731;
            letter-spacing: 2px;
        }

        .logo span {
            color: #fff;
            font-weight: 300;
        }

        .logo .tagline {
            font-size: 0.65rem;
            color: #64748b;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #cbd5e0;
            margin-left: 20px;
            font-weight: 500;
            font-size: 0.9rem;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #f7b731;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #f7b731;
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links .cta-nav {
            background: #f7b731;
            color: #0b0d15;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
        }
        .nav-links .cta-nav:hover {
            background: #e8a820;
            color: #0b0d15;
        }
        .nav-links .cta-nav::after {
            display: none;
        }

        /* ===== LANGUAGE DROPDOWN (placeholder) ===== */
        .lang-dropdown {
            position: relative;
            display: inline-block;
        }
        .lang-btn {
            background: rgba(20, 24, 36, 0.8);
            color: #eef2f6;
            padding: 8px 16px;
            border: 1px solid #2d3348;
            border-radius: 30px;
            cursor: default;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
        }
        .lang-btn i {
            opacity: 0.5;
        }

        /* ===== 404 HERO ===== */
        .error-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 60px;
            background: radial-gradient(circle at 30% 40%, #141824, #0b0d15 80%);
            text-align: center;
            min-height: 70vh;
        }

        .error-content {
            max-width: 720px;
            width: 100%;
        }

        /* ===== ANIMATED ICON ===== */
        .error-icon {
            font-size: 7rem;
            color: #f7b731;
            display: inline-block;
            margin-bottom: 10px;
            animation: glitchFlicker 3s infinite ease-in-out;
            position: relative;
        }

        .error-icon .fa-tv {
            display: inline-block;
            animation: tvPulse 2s infinite alternate;
        }

        .error-icon .fa-satellite-dish {
            position: absolute;
            font-size: 2.2rem;
            top: -10px;
            right: -30px;
            color: #f7b731aa;
            animation: spinDish 8s infinite linear;
        }

        @keyframes tvPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(-2deg); opacity: 1; }
        }

        @keyframes spinDish {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes glitchFlicker {
            0%, 100% { opacity: 1; transform: translateX(0) skewX(0deg); }
            3% { opacity: 0.6; transform: translateX(-6px) skewX(-4deg); }
            6% { opacity: 1; transform: translateX(4px) skewX(3deg); }
            9% { opacity: 0.8; transform: translateX(-2px) skewX(-1deg); }
            12% { opacity: 1; transform: translateX(0) skewX(0deg); }
            92% { opacity: 1; }
            95% { opacity: 0.3; transform: scale(0.98); }
            97% { opacity: 1; transform: scale(1.02); }
        }

        /* ===== TEXT ===== */
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(145deg, #f7b731, #e8a820);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: -0.2rem;
            letter-spacing: 6px;
            animation: codeGlow 3s infinite alternate;
        }

        @keyframes codeGlow {
            0% { text-shadow: 0 0 20px rgba(247, 183, 49, 0.1); }
            100% { text-shadow: 0 0 50px rgba(247, 183, 49, 0.25); }
        }

        .error-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 0.2rem 0 0.5rem;
            color: #fff;
        }

        .error-title span {
            color: #f7b731;
        }

        .error-desc {
            font-size: 1.15rem;
            color: #94a3b8;
            max-width: 520px;
            margin: 0.5rem auto 1.8rem;
            line-height: 1.7;
        }

        .error-desc i {
            color: #f7b731;
            margin: 0 4px;
        }

        /* ===== CTA BUTTON (matches main site) ===== */
        .cta-btn {
            display: inline-block;
            background: #f7b731;
            color: #0b0d15;
            padding: 14px 44px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(247, 183, 49, 0.25);
            border: none;
            cursor: pointer;
        }

        .cta-btn:hover {
            background: #e8a820;
            transform: scale(1.04);
            box-shadow: 0 0 45px rgba(247, 183, 49, 0.4);
        }

        .cta-btn i {
            margin-right: 10px;
        }

        /* ===== SEARCH GLITCH LINE ===== */
        .glitch-line {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 1.5rem 0 0.8rem;
            font-size: 0.85rem;
            color: #64748b;
            flex-wrap: wrap;
        }

        .glitch-line span {
            background: rgba(20, 24, 36, 0.6);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid #2d3348;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            animation: scanline 4s infinite;
        }

        @keyframes scanline {
            0%, 100% { opacity: 0.6; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(4px); }
        }

        /* ===== FOOTER (minimal, matches) ===== */
        footer {
            text-align: center;
            padding: 18px 0 14px;
            border-top: 1px solid #2d3348;
            color: #64748b;
            margin-top: auto;
        }

        footer a {
            color: #f7b731;
        }

        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 8px 0 6px;
        }

        footer .social-links a {
            color: #64748b;
            font-size: 1.3rem;
            transition: 0.3s;
        }

        footer .social-links a:hover {
            color: #f7b731;
            transform: scale(1.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-flex {
                flex-direction: column;
                gap: 8px;
            }
            .header-right {
                width: 100%;
                justify-content: center;
            }
            .nav-links a {
                margin: 0 8px;
                font-size: 0.8rem;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-icon {
                font-size: 5rem;
            }
            .error-icon .fa-satellite-dish {
                font-size: 1.6rem;
                right: -18px;
                top: -6px;
            }
            .error-title {
                font-size: 1.8rem;
            }
            .error-desc {
                font-size: 1rem;
                padding: 0 10px;
            }
            .cta-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links a {
                margin: 0 5px;
                font-size: 0.7rem;
            }
            .nav-links .cta-nav {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
            .error-code {
                font-size: 4rem;
            }
            .error-icon {
                font-size: 4rem;
            }
            .error-title {
                font-size: 1.4rem;
            }
            .glitch-line {
                font-size: 0.7rem;
            }
        }

        /* ===== RTL ===== */
        [dir="rtl"] .nav-links a {
            margin-left: 0;
            margin-right: 20px;
        }
        [dir="rtl"] .cta-btn i {
            margin-right: 0;
            margin-left: 10px;
        }
        [dir="rtl"] .error-icon .fa-satellite-dish {
            right: auto;
            left: -30px;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER (exact match) ===== -->
    <header>
        <div class="container header-flex">

    <!-- ===== FOOTER (minimal) ===== -->
    <footer>

        </div>
    </footer>

    <!-- ===== YEAR SCRIPT ===== -->
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // ===== RTL TOGGLE (demo: press "R" to toggle RTL) =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                const html = document.documentElement;
                if (html.dir === 'rtl') {
                    html.dir = 'ltr';
                } else {
                    html.dir = 'rtl';
                }
            }
        });

        console.log('📺 DREAM 24K IPTV · 404 Signal Lost · Press "R" to toggle RTL');

</html>
