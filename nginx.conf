server {
    listen 80;
    server_name d24kiptv.com www.d24kiptv.com;
    root /var/www/html;
    index index.html;

    # ===== CUSTOM 404 PAGE =====
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/html;
        internal;
    }

    # ===== MAIN ROUTING =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== STATIC FILES =====
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===== ROBOTS & SITEMAP =====
    location = /robots.txt {
        root /var/www/html;
    }
    location = /sitemap.xml {
        root /var/www/html;
    }

    # ===== SECURITY =====
    location ~ /\. {
        deny all;
    }

    # ===== GZIP =====
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css text/plain text/xml text/javascript application/javascript application/json;
}
