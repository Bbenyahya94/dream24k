# /etc/nginx/sites-available/d24kiptv.conf

server {
    listen 80;
    server_name d24kiptv.com www.d24kiptv.com;
    root /var/www/d24kiptv;
    index index.html;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
        root /var/www/d24kiptv;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # robots.txt
    location = /robots.txt {
        root /var/www/d24kiptv;
    }

    # sitemap.xml
    location = /sitemap.xml {
        root /var/www/d24kiptv;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
